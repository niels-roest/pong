<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PONG</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Orbitron', monospace;
      overflow: hidden;
      cursor: none;
    }
    #wrap {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
    }
    canvas { display: block; }
    #overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(5,5,15,0.85);
      backdrop-filter: blur(10px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.6s ease;
      z-index: 10;
    }
    #overlay.show { opacity: 1; pointer-events: all; cursor: default; }
    #overlay h1 {
      font-size: 2.4rem;
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
      background: linear-gradient(135deg, #00f0ff, #b400ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: none;
      filter: drop-shadow(0 0 30px rgba(0,240,255,0.5));
    }
    #overlay .subtitle {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 4px;
      margin-bottom: 1.2rem;
      font-family: 'Orbitron', monospace;
    }
    #stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem 3.5rem;
      margin-bottom: 2.2rem;
    }
    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .stat-label {
      font-family: 'Orbitron', monospace;
      font-size: 0.45rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .stat-val {
      font-family: 'Orbitron', monospace;
      font-size: 1.1rem;
      color: rgba(255,255,255,0.75);
      font-weight: 700;
    }
    #playAgain {
      background: transparent;
      color: #00f0ff;
      border: 2px solid rgba(0,240,255,0.5);
      padding: 0.9rem 3rem;
      font-size: 0.9rem;
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      letter-spacing: 5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    #playAgain::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(0,240,255,0.15), rgba(180,0,255,0.15));
      opacity: 0;
      transition: opacity 0.2s;
    }
    #playAgain:hover {
      border-color: #00f0ff;
      box-shadow: 0 0 30px rgba(0,240,255,0.3), inset 0 0 30px rgba(0,240,255,0.1);
      transform: scale(1.05);
      cursor: pointer;
    }
    #playAgain:hover::before { opacity: 1; }
    #startScreen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(5,5,15,0.92);
      z-index: 10;
      transition: opacity 0.6s ease;
    }
    #startScreen.hide { opacity: 0; pointer-events: none; }
    #startScreen .logo {
      font-size: 5rem;
      font-weight: 900;
      font-family: 'Orbitron', monospace;
      letter-spacing: 20px;
      background: linear-gradient(135deg, #00f0ff, #b400ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 40px rgba(0,240,255,0.4));
      margin-bottom: 3rem;
    }
    .controls-row {
      display: flex;
      gap: 5rem;
      margin-bottom: 3rem;
    }
    .control-group {
      text-align: center;
      color: rgba(255,255,255,0.5);
      font-size: 0.7rem;
      letter-spacing: 3px;
    }
    .control-group .player-label {
      font-size: 0.65rem;
      letter-spacing: 4px;
      margin-bottom: 0.8rem;
      opacity: 0.6;
    }
    .control-group .keys {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .key {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px; height: 42px;
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.03);
    }
    .press-start {
      color: rgba(0,240,255,0.6);
      font-size: 0.7rem;
      letter-spacing: 5px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="c"></canvas>
    <div id="startScreen">
      <div class="logo">PONG</div>
      <div class="controls-row">
        <div class="control-group">
          <div class="player-label">PLAYER 1</div>
          <div class="keys">
            <div class="key">W</div>
            <div class="key">S</div>
          </div>
        </div>
        <div class="control-group">
          <div class="player-label">PLAYER 2</div>
          <div class="keys">
            <div class="key">&uarr;</div>
            <div class="key">&darr;</div>
          </div>
        </div>
      </div>
      <div class="press-start">PRESS ANY KEY TO START</div>
    </div>
    <div id="overlay">
      <h1 id="winMsg"></h1>
      <div class="subtitle" id="winSub"></div>
      <div id="stats"></div>
      <button id="playAgain">REMATCH</button>
    </div>
  </div>

  <script>
  (() => {
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const winMsg = document.getElementById('winMsg');
    const winSub = document.getElementById('winSub');
    const statsEl = document.getElementById('stats');
    const startScreen = document.getElementById('startScreen');

    // ── Constants ────────────────────────────────────────────────────────
    const W = 960, H = 640;
    canvas.width = W; canvas.height = H;

    const PAD_W = 12, PAD_H = 100, PAD_GAP = 35, BALL_R = 7;
    const INIT_SPEED = 3.5;
    const SPEED_INC = 0.3;
    const MAX_SPEED = 10;
    const PAD_SPEED = 5.5;
    const WIN_SCORE = 7;

    const P1_COLOR = '#00f0ff';
    const P2_COLOR = '#b400ff';

    // Power-up config
    const PU_RADIUS = 24;
    const PU_COLLECT_DIST = 30;
    const PU_SPAWN_MIN = 8000;
    const PU_SPAWN_MAX = 12000;
    const PU_TYPES = [
      { id: 'bigPaddle', color: '#44ff88', duration: 8000, label: 'BIG' },
      { id: 'multiBall', color: '#ffdd00', duration: 0,    label: 'MULTI' },
      { id: 'slow',      color: '#ff4466', duration: 6000, label: 'SLOW' }
    ];

    // ── Audio ────────────────────────────────────────────────────────────
    let audioCtx;
    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function synth(freq, dur, type = 'square', vol = 0.12) {
      ensureAudio();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 3000;
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(vol, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
      osc.start();
      osc.stop(audioCtx.currentTime + dur);
    }

    function sfxPaddle(side) {
      const base = side === 1 ? 330 : 392;
      synth(base, 0.06, 'triangle', 0.15);
      synth(base * 1.5, 0.04, 'sine', 0.08);
    }
    function sfxWall() { synth(700, 0.03, 'sine', 0.06); }
    function sfxScore() {
      synth(150, 0.3, 'sawtooth', 0.1);
      setTimeout(() => synth(100, 0.2, 'sawtooth', 0.08), 80);
    }
    function sfxCountdown() { synth(880, 0.08, 'sine', 0.1); }
    function sfxGo() {
      synth(880, 0.1, 'triangle', 0.12);
      setTimeout(() => synth(1100, 0.1, 'triangle', 0.12), 80);
      setTimeout(() => synth(1320, 0.15, 'triangle', 0.14), 160);
    }
    function sfxWin() {
      [0, 100, 200, 320, 480].forEach((t, i) => {
        setTimeout(() => synth(440 * Math.pow(2, i / 6), 0.15, 'triangle', 0.1), t);
      });
    }
    function sfxPowerup() {
      synth(660, 0.06, 'sine', 0.1);
      setTimeout(() => synth(880, 0.06, 'sine', 0.1), 50);
      setTimeout(() => synth(1100, 0.08, 'sine', 0.12), 100);
    }
    function sfxFirework() {
      synth(300 + Math.random() * 500, 0.2, 'sine', 0.05);
      synth(600 + Math.random() * 400, 0.15, 'triangle', 0.04);
    }

    // ── Particles ────────────────────────────────────────────────────────
    const particles = [];

    function spawnParticles(x, y, color, count = 8, spread = 3) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * spread + 1;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          decay: 0.02 + Math.random() * 0.03,
          radius: 1.5 + Math.random() * 3,
          color, gravity: 0
        });
      }
    }

    function spawnScoreExplosion(x, y, color) {
      for (let i = 0; i < 35; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 6 + 2;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          decay: 0.012 + Math.random() * 0.015,
          radius: 2 + Math.random() * 4,
          color, gravity: 0
        });
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.97;
        p.vy *= 0.97;
        if (p.gravity) p.vy += p.gravity;
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.globalAlpha = p.life * 0.8;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(0.5, p.radius * p.life), 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
    }

    // ── Fireworks ────────────────────────────────────────────────────────
    const fireworks = [];

    function launchFireworks(color) {
      const altColor = color === P1_COLOR ? '#66ffff' : '#dd66ff';
      for (let i = 0; i < 5; i++) {
        setTimeout(() => {
          fireworks.push({
            x: W * 0.15 + Math.random() * W * 0.7,
            y: H + 10,
            vx: (Math.random() - 0.5) * 1.5,
            vy: -(7 + Math.random() * 3),
            color: i % 2 === 0 ? color : altColor,
            trail: []
          });
        }, i * 350 + Math.random() * 150);
      }
    }

    function updateFireworks() {
      for (let i = fireworks.length - 1; i >= 0; i--) {
        const fw = fireworks[i];
        fw.trail.push({ x: fw.x, y: fw.y });
        if (fw.trail.length > 8) fw.trail.shift();
        fw.x += fw.vx;
        fw.y += fw.vy;
        fw.vy += 0.12;

        // Explode at apex
        if (fw.vy > -0.5) {
          // Ring burst
          const ringCount = 30 + Math.floor(Math.random() * 15);
          for (let j = 0; j < ringCount; j++) {
            const angle = (j / ringCount) * Math.PI * 2;
            const speed = 2.5 + Math.random() * 2;
            particles.push({
              x: fw.x, y: fw.y,
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed,
              life: 1,
              decay: 0.008 + Math.random() * 0.008,
              radius: 1.5 + Math.random() * 2.5,
              color: fw.color,
              gravity: 0.04
            });
          }
          sfxFirework();
          fireworks.splice(i, 1);
        }
      }
    }

    function drawFireworks() {
      for (const fw of fireworks) {
        // Rocket trail
        for (let t = 0; t < fw.trail.length; t++) {
          const a = t / fw.trail.length;
          ctx.globalAlpha = a * 0.6;
          ctx.fillStyle = fw.color;
          ctx.beginPath();
          ctx.arc(fw.trail[t].x, fw.trail[t].y, 2 * a, 0, Math.PI * 2);
          ctx.fill();
        }
        // Rocket head
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#fff';
        ctx.shadowColor = fw.color;
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.arc(fw.x, fw.y, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
      ctx.globalAlpha = 1;
    }

    // ── Confetti ─────────────────────────────────────────────────────────
    const confetti = [];

    function spawnConfetti(color) {
      const colors = [color, '#ffffff', '#ffdd44', '#ff88aa', '#88ffcc'];
      for (let i = 0; i < 50; i++) {
        setTimeout(() => {
          confetti.push({
            x: Math.random() * W,
            y: -10 - Math.random() * 40,
            vx: (Math.random() - 0.5) * 1.5,
            vy: 1.2 + Math.random() * 2,
            w: 4 + Math.random() * 5,
            h: 3 + Math.random() * 4,
            rot: Math.random() * Math.PI * 2,
            rotV: (Math.random() - 0.5) * 0.12,
            color: colors[Math.floor(Math.random() * colors.length)],
            phase: Math.random() * Math.PI * 2,
            phaseV: 0.02 + Math.random() * 0.02
          });
        }, Math.random() * 2500);
      }
    }

    function updateConfetti() {
      for (let i = confetti.length - 1; i >= 0; i--) {
        const c = confetti[i];
        c.phase += c.phaseV;
        c.x += c.vx + Math.sin(c.phase) * 0.6;
        c.y += c.vy;
        c.rot += c.rotV;
        if (c.y > H + 30) confetti.splice(i, 1);
      }
    }

    function drawConfetti() {
      for (const c of confetti) {
        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.rotate(c.rot);
        ctx.globalAlpha = 0.75;
        ctx.fillStyle = c.color;
        ctx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
        ctx.restore();
      }
      ctx.globalAlpha = 1;
    }

    // ── Ball Trail ───────────────────────────────────────────────────────
    const trail = [];
    const TRAIL_LEN = 18;

    function updateTrail() {
      if (!ball) return;
      trail.unshift({ x: ball.x, y: ball.y, color: getHeatColor(ball.speed) });
      if (trail.length > TRAIL_LEN) trail.pop();
    }

    function drawTrail() {
      for (let i = 0; i < trail.length; i++) {
        const t = 1 - i / trail.length;
        const r = BALL_R * t * 0.8;
        if (r < 0.5) continue;
        ctx.globalAlpha = t * 0.3;
        const grad = ctx.createRadialGradient(trail[i].x, trail[i].y, 0, trail[i].x, trail[i].y, r);
        grad.addColorStop(0, trail[i].color || '#fff');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(trail[i].x, trail[i].y, r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // ── Screen Shake ─────────────────────────────────────────────────────
    let shakeX = 0, shakeY = 0, shakeMag = 0, shakeDecay = 0.9;

    function triggerShake(magnitude = 6) { shakeMag = magnitude; }

    function updateShake() {
      if (shakeMag > 0.3) {
        shakeX = (Math.random() - 0.5) * shakeMag * 2;
        shakeY = (Math.random() - 0.5) * shakeMag * 2;
        shakeMag *= shakeDecay;
      } else {
        shakeX = shakeY = shakeMag = 0;
      }
    }

    // ── Heat Color ───────────────────────────────────────────────────────
    function getHeatColor(speed) {
      const t = clamp((speed - INIT_SPEED) / (MAX_SPEED - INIT_SPEED), 0, 1);
      if (t < 0.33) return lerpColor('#ffffff', '#00f0ff', t / 0.33);
      if (t < 0.66) return lerpColor('#00f0ff', '#ff8800', (t - 0.33) / 0.33);
      return lerpColor('#ff8800', '#ff2200', (t - 0.66) / 0.34);
    }

    // ── State ────────────────────────────────────────────────────────────
    let p1, p2, ball;
    let running = false, gameOver = false, started = false;
    let countdownVal = 0, countdownTimer = 0;
    let hitFlash = { p1: 0, p2: 0 };
    let rallyCount = 0;

    // Power-ups
    let extraBalls = [];
    let activePowerup = null;  // { type, x, y, spawnTime }
    let lastPowerupTime = 0;
    let playerEffects = {
      p1: { bigPaddle: 0, slowDown: 0 },
      p2: { bigPaddle: 0, slowDown: 0 }
    };

    // Stats
    let stats = { longestRally: 0, maxSpeed: 0, p1Hits: 0, p2Hits: 0 };

    function initPlayers() {
      p1 = { y: H / 2 - PAD_H / 2, score: 0 };
      p2 = { y: H / 2 - PAD_H / 2, score: 0 };
    }
    initPlayers();

    function getEffPadH(player) {
      const eff = player === 1 ? playerEffects.p1 : playerEffects.p2;
      return eff.bigPaddle > Date.now() ? PAD_H * 1.4 : PAD_H;
    }

    function getEffPadSpeed(player) {
      const eff = player === 1 ? playerEffects.p1 : playerEffects.p2;
      return eff.slowDown > Date.now() ? PAD_SPEED * 0.55 : PAD_SPEED;
    }

    // ── Input ────────────────────────────────────────────────────────────
    const keys = {};
    document.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (['ArrowUp', 'ArrowDown', ' '].includes(e.key)) e.preventDefault();
      if (!started) {
        ensureAudio();
        started = true;
        startScreen.classList.add('hide');
        setTimeout(() => { startScreen.style.display = 'none'; }, 600);
        beginCountdown();
      }
    });
    document.addEventListener('keyup', e => { keys[e.key] = false; });

    document.getElementById('playAgain').addEventListener('click', resetGame);

    // ── Countdown ────────────────────────────────────────────────────────
    function beginCountdown() {
      countdownVal = 3;
      running = false;
      ball = null;
      trail.length = 0;

      function cdTick() {
        if (countdownVal > 0) {
          sfxCountdown();
          countdownTimer = performance.now();
          setTimeout(() => {
            countdownVal--;
            if (countdownVal > 0) {
              cdTick();
            } else {
              sfxGo();
              countdownTimer = performance.now();
              setTimeout(() => {
                countdownVal = -1;
                launchBall();
              }, 500);
            }
          }, 700);
        }
      }
      cdTick();
    }

    function launchBall() {
      const angle = (Math.random() * 50 - 25) * (Math.PI / 180);
      const dirX = Math.random() < 0.5 ? 1 : -1;
      ball = {
        x: W / 2, y: H / 2,
        vx: Math.cos(angle) * INIT_SPEED * dirX,
        vy: Math.sin(angle) * INIT_SPEED,
        speed: INIT_SPEED
      };
      trail.length = 0;
      rallyCount = 0;
      running = true;
      lastPowerupTime = Date.now();
    }

    function resetGame() {
      initPlayers();
      overlay.classList.remove('show');
      gameOver = false;
      particles.length = 0;
      trail.length = 0;
      extraBalls.length = 0;
      fireworks.length = 0;
      confetti.length = 0;
      activePowerup = null;
      lastPowerupTime = Date.now();
      playerEffects = { p1: { bigPaddle: 0, slowDown: 0 }, p2: { bigPaddle: 0, slowDown: 0 } };
      stats = { longestRally: 0, maxSpeed: 0, p1Hits: 0, p2Hits: 0 };
      beginCountdown();
    }

    // ── Power-ups ────────────────────────────────────────────────────────
    function trySpawnPowerup() {
      if (activePowerup || !running || gameOver) return;
      const now = Date.now();
      const delay = PU_SPAWN_MIN + Math.random() * (PU_SPAWN_MAX - PU_SPAWN_MIN);
      if (now - lastPowerupTime < delay) return;

      const type = PU_TYPES[Math.floor(Math.random() * PU_TYPES.length)];
      activePowerup = {
        type: type.id,
        color: type.color,
        x: W * 0.3 + Math.random() * W * 0.4,
        y: 60 + Math.random() * (H - 120),
        spawnTime: now
      };
    }

    function checkPowerupCollision(b) {
      if (!activePowerup) return;
      const dx = b.x - activePowerup.x;
      const dy = b.y - activePowerup.y;
      if (dx * dx + dy * dy < PU_COLLECT_DIST * PU_COLLECT_DIST) {
        const collector = b.vx > 0 ? 2 : 1;
        applyPowerup(activePowerup.type, collector);
        sfxPowerup();
        spawnParticles(activePowerup.x, activePowerup.y, activePowerup.color, 15, 4);
        activePowerup = null;
        lastPowerupTime = Date.now();
      }
    }

    function applyPowerup(type, player) {
      const pe = player === 1 ? playerEffects.p1 : playerEffects.p2;
      const opp = player === 1 ? playerEffects.p2 : playerEffects.p1;
      const now = Date.now();

      if (type === 'bigPaddle') {
        pe.bigPaddle = now + 8000;
      } else if (type === 'multiBall') {
        for (let i = 0; i < 2; i++) {
          const angle = (Math.random() * 120 - 60) * (Math.PI / 180);
          const dir = Math.random() < 0.5 ? 1 : -1;
          extraBalls.push({
            x: W / 2, y: H / 2,
            vx: Math.cos(angle) * INIT_SPEED * 1.3 * dir,
            vy: Math.sin(angle) * INIT_SPEED * 1.3,
            speed: INIT_SPEED * 1.3
          });
        }
      } else if (type === 'slow') {
        opp.slowDown = now + 6000;
      }
    }

    // ── Helpers ──────────────────────────────────────────────────────────
    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
    function lerp(a, b, t) { return a + (b - a) * t; }

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function lerpColor(hex1, hex2, t) {
      const r1 = parseInt(hex1.slice(1, 3), 16), g1 = parseInt(hex1.slice(3, 5), 16), b1 = parseInt(hex1.slice(5, 7), 16);
      const r2 = parseInt(hex2.slice(1, 3), 16), g2 = parseInt(hex2.slice(3, 5), 16), b2 = parseInt(hex2.slice(5, 7), 16);
      const r = Math.round(lerp(r1, r2, t)), g = Math.round(lerp(g1, g2, t)), b = Math.round(lerp(b1, b2, t));
      return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
    }

    // ── Ball Physics (shared by main + extra balls) ─────────────────────
    function processBallPhysics(b, isMain) {
      b.x += b.vx;
      b.y += b.vy;

      // Walls
      if (b.y - BALL_R <= 0) {
        b.y = BALL_R;
        b.vy = Math.abs(b.vy);
        sfxWall();
        spawnParticles(b.x, 0, 'rgba(255,255,255,0.6)', 4, 2);
      }
      if (b.y + BALL_R >= H) {
        b.y = H - BALL_R;
        b.vy = -Math.abs(b.vy);
        sfxWall();
        spawnParticles(b.x, H, 'rgba(255,255,255,0.6)', 4, 2);
      }

      // Left paddle
      const p1H = getEffPadH(1);
      const lx = PAD_GAP;
      if (b.vx < 0 &&
          b.x - BALL_R <= lx + PAD_W && b.x + BALL_R > lx &&
          b.y + BALL_R > p1.y && b.y - BALL_R < p1.y + p1H) {
        b.x = lx + PAD_W + BALL_R;
        b.speed = Math.min(b.speed + SPEED_INC, MAX_SPEED);
        const hit = (b.y - (p1.y + p1H / 2)) / (p1H / 2);
        const angle = hit * 55 * (Math.PI / 180);
        b.vx = Math.cos(angle) * b.speed;
        b.vy = Math.sin(angle) * b.speed;
        sfxPaddle(1);
        hitFlash.p1 = 1;
        if (isMain) {
          rallyCount++;
          stats.p1Hits++;
          triggerShake(2 + Math.min(rallyCount * 0.3, 4));
        }
        spawnParticles(lx + PAD_W, b.y, P1_COLOR, 8, 3);
      }

      // Right paddle
      const p2H = getEffPadH(2);
      const rx = W - PAD_GAP - PAD_W;
      if (b.vx > 0 &&
          b.x + BALL_R >= rx && b.x - BALL_R < rx + PAD_W &&
          b.y + BALL_R > p2.y && b.y - BALL_R < p2.y + p2H) {
        b.x = rx - BALL_R;
        b.speed = Math.min(b.speed + SPEED_INC, MAX_SPEED);
        const hit = (b.y - (p2.y + p2H / 2)) / (p2H / 2);
        const angle = hit * 55 * (Math.PI / 180);
        b.vx = -Math.cos(angle) * b.speed;
        b.vy = Math.sin(angle) * b.speed;
        sfxPaddle(2);
        hitFlash.p2 = 1;
        if (isMain) {
          rallyCount++;
          stats.p2Hits++;
          triggerShake(2 + Math.min(rallyCount * 0.3, 4));
        }
        spawnParticles(rx, b.y, P2_COLOR, 8, 3);
      }
    }

    // ── Update ───────────────────────────────────────────────────────────
    function update() {
      updateShake();
      updateParticles();
      updateFireworks();
      updateConfetti();
      hitFlash.p1 = Math.max(0, hitFlash.p1 - 0.04);
      hitFlash.p2 = Math.max(0, hitFlash.p2 - 0.04);

      if (!running || gameOver) return;

      // Paddles
      const p1Spd = getEffPadSpeed(1);
      const p2Spd = getEffPadSpeed(2);
      if (keys['w'] || keys['W']) p1.y -= p1Spd;
      if (keys['s'] || keys['S']) p1.y += p1Spd;
      if (keys['ArrowUp'])   p2.y -= p2Spd;
      if (keys['ArrowDown']) p2.y += p2Spd;
      p1.y = clamp(p1.y, 0, H - getEffPadH(1));
      p2.y = clamp(p2.y, 0, H - getEffPadH(2));

      // Power-up spawning
      trySpawnPowerup();

      if (!ball) return;

      // Main ball
      processBallPhysics(ball, true);
      updateTrail();

      // Track stats
      if (ball.speed > stats.maxSpeed) stats.maxSpeed = ball.speed;

      // Heat-based trail particles
      if (ball.speed > 5 && Math.random() < 0.4) {
        spawnParticles(ball.x, ball.y, hexToRgba(getHeatColor(ball.speed), 0.5), 1, 0.5);
      }

      // Power-up collision (main ball only)
      checkPowerupCollision(ball);

      // Main ball scoring
      if (ball.x + BALL_R < -20) {
        p2.score++;
        sfxScore();
        triggerShake(10);
        spawnScoreExplosion(0, ball.y, P2_COLOR);
        stats.longestRally = Math.max(stats.longestRally, rallyCount);
        if (!checkWin()) nextRound();
        return;
      } else if (ball.x - BALL_R > W + 20) {
        p1.score++;
        sfxScore();
        triggerShake(10);
        spawnScoreExplosion(W, ball.y, P1_COLOR);
        stats.longestRally = Math.max(stats.longestRally, rallyCount);
        if (!checkWin()) nextRound();
        return;
      }

      // Extra balls
      for (let i = extraBalls.length - 1; i >= 0; i--) {
        const eb = extraBalls[i];
        processBallPhysics(eb, false);

        if (eb.x + BALL_R < -20) {
          p2.score++;
          sfxScore();
          spawnScoreExplosion(0, eb.y, P2_COLOR);
          extraBalls.splice(i, 1);
          if (checkWin()) return;
        } else if (eb.x - BALL_R > W + 20) {
          p1.score++;
          sfxScore();
          spawnScoreExplosion(W, eb.y, P1_COLOR);
          extraBalls.splice(i, 1);
          if (checkWin()) return;
        }
      }
    }

    function nextRound() {
      running = false;
      ball = null;
      trail.length = 0;
      extraBalls.length = 0;
      activePowerup = null;
      setTimeout(beginCountdown, 800);
    }

    function checkWin() {
      if (p1.score >= WIN_SCORE) { endGame(1); return true; }
      if (p2.score >= WIN_SCORE) { endGame(2); return true; }
      return false;
    }

    function endGame(winner) {
      running = false;
      gameOver = true;
      ball = null;
      extraBalls.length = 0;
      activePowerup = null;
      stats.longestRally = Math.max(stats.longestRally, rallyCount);

      const winColor = winner === 1 ? P1_COLOR : P2_COLOR;
      winMsg.textContent = `PLAYER ${winner} WINS`;
      winSub.textContent = `${p1.score} \u2014 ${p2.score}`;

      // Stats display
      statsEl.innerHTML =
        `<div class="stat"><span class="stat-label">LONGEST RALLY</span><span class="stat-val">${stats.longestRally}</span></div>` +
        `<div class="stat"><span class="stat-label">MAX SPEED</span><span class="stat-val">${stats.maxSpeed.toFixed(1)}</span></div>` +
        `<div class="stat"><span class="stat-label">P1 HITS</span><span class="stat-val">${stats.p1Hits}</span></div>` +
        `<div class="stat"><span class="stat-label">P2 HITS</span><span class="stat-val">${stats.p2Hits}</span></div>`;

      sfxWin();
      launchFireworks(winColor);
      spawnConfetti(winColor);
      setTimeout(() => overlay.classList.add('show'), 800);
    }

    // ── Draw ─────────────────────────────────────────────────────────────
    function draw() {
      ctx.save();
      ctx.translate(shakeX, shakeY);

      // Background
      ctx.fillStyle = '#08080f';
      ctx.fillRect(-10, -10, W + 20, H + 20);

      // Subtle grid
      ctx.strokeStyle = 'rgba(255,255,255,0.02)';
      ctx.lineWidth = 1;
      for (let x = 0; x < W; x += 40) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let y = 0; y < H; y += 40) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }

      // Center line
      ctx.setLineDash([8, 18]);
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(W / 2, 0);
      ctx.lineTo(W / 2, H);
      ctx.stroke();
      ctx.setLineDash([]);

      // Center circle
      ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(W / 2, H / 2, 60, 0, Math.PI * 2);
      ctx.stroke();

      // Scores
      drawScore(p1.score, W / 2 - 100, 80, P1_COLOR);
      drawScore(p2.score, W / 2 + 100, 80, P2_COLOR);
      drawPips(W / 2 - 100, 105, p1.score, P1_COLOR);
      drawPips(W / 2 + 100, 105, p2.score, P2_COLOR);

      // Trail
      drawTrail();

      // Particles
      drawParticles();

      // Power-up on field
      if (activePowerup) drawPowerup(activePowerup);

      // Paddles
      const p1H = getEffPadH(1);
      const p2H = getEffPadH(2);
      drawPaddle(PAD_GAP, p1.y, P1_COLOR, hitFlash.p1, p1H);
      drawPaddle(W - PAD_GAP - PAD_W, p2.y, P2_COLOR, hitFlash.p2, p2H);

      // Effect indicators
      drawEffectIndicators(PAD_GAP, p1.y, p1H, playerEffects.p1, true);
      drawEffectIndicators(W - PAD_GAP - PAD_W, p2.y, p2H, playerEffects.p2, false);

      // All balls
      const allBalls = ball ? [ball, ...extraBalls] : [...extraBalls];
      for (const b of allBalls) {
        drawBall(b);
      }

      // Countdown
      if (countdownVal > 0) {
        const elapsed = (performance.now() - countdownTimer) / 700;
        const scale = 1 + elapsed * 0.5;
        const alpha = 1 - elapsed;
        ctx.save();
        ctx.globalAlpha = Math.max(0, alpha);
        ctx.font = `900 ${80 * scale}px 'Orbitron', monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#fff';
        ctx.shadowColor = '#00f0ff';
        ctx.shadowBlur = 30;
        ctx.fillText(countdownVal, W / 2, H / 2);
        ctx.shadowBlur = 0;
        ctx.restore();
      } else if (countdownVal === 0) {
        const elapsed = (performance.now() - countdownTimer) / 500;
        const scale = 1 + elapsed * 0.8;
        const alpha = 1 - elapsed;
        if (alpha > 0) {
          ctx.save();
          ctx.globalAlpha = Math.max(0, alpha);
          ctx.font = `900 ${50 * scale}px 'Orbitron', monospace`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillStyle = '#00f0ff';
          ctx.shadowColor = '#00f0ff';
          ctx.shadowBlur = 40;
          ctx.fillText('GO', W / 2, H / 2);
          ctx.shadowBlur = 0;
          ctx.restore();
        }
      }

      // Fireworks + confetti (draw on top so they show through overlay blur)
      drawFireworks();
      drawConfetti();

      // Edge glow
      const edgeGrad1 = ctx.createLinearGradient(0, 0, 0, H);
      edgeGrad1.addColorStop(0, 'rgba(0,240,255,0.08)');
      edgeGrad1.addColorStop(0.5, 'rgba(0,240,255,0)');
      edgeGrad1.addColorStop(1, 'rgba(0,240,255,0.08)');
      ctx.fillStyle = edgeGrad1;
      ctx.fillRect(0, 0, 2, H);

      const edgeGrad2 = ctx.createLinearGradient(0, 0, 0, H);
      edgeGrad2.addColorStop(0, 'rgba(180,0,255,0.08)');
      edgeGrad2.addColorStop(0.5, 'rgba(180,0,255,0)');
      edgeGrad2.addColorStop(1, 'rgba(180,0,255,0.08)');
      ctx.fillStyle = edgeGrad2;
      ctx.fillRect(W - 2, 0, 2, H);

      ctx.fillStyle = 'rgba(255,255,255,0.04)';
      ctx.fillRect(0, 0, W, 1);
      ctx.fillRect(0, H - 1, W, 1);

      // Vignette
      const vig = ctx.createRadialGradient(W / 2, H / 2, H * 0.35, W / 2, H / 2, H * 0.9);
      vig.addColorStop(0, 'rgba(0,0,0,0)');
      vig.addColorStop(1, 'rgba(0,0,0,0.5)');
      ctx.fillStyle = vig;
      ctx.fillRect(-10, -10, W + 20, H + 20);

      // Scanlines
      ctx.fillStyle = 'rgba(0,0,0,0.06)';
      for (let y = 0; y < H; y += 4) {
        ctx.fillRect(0, y, W, 1);
      }

      ctx.restore();
    }

    // ── Draw Helpers ─────────────────────────────────────────────────────
    function drawBall(b) {
      const heatColor = getHeatColor(b.speed);

      // Outer glow
      const glowSize = BALL_R * 4;
      const ballGrad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, glowSize);
      ballGrad.addColorStop(0, hexToRgba(heatColor, 0.15));
      ballGrad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = ballGrad;
      ctx.beginPath();
      ctx.arc(b.x, b.y, glowSize, 0, Math.PI * 2);
      ctx.fill();

      // Core
      ctx.fillStyle = heatColor;
      ctx.shadowColor = heatColor;
      ctx.shadowBlur = 15;
      ctx.beginPath();
      ctx.arc(b.x, b.y, BALL_R, 0, Math.PI * 2);
      ctx.fill();

      // White hot center
      ctx.fillStyle = '#fff';
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.arc(b.x, b.y, BALL_R * 0.45, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawScore(score, x, y, color) {
      ctx.font = '900 60px "Orbitron", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillStyle = color;
      ctx.globalAlpha = 0.2;
      ctx.fillText(score, x, y - 50);
      ctx.globalAlpha = 1;
    }

    function drawPips(cx, y, score, color) {
      const gap = 12;
      const startX = cx - ((WIN_SCORE - 1) * gap) / 2;
      for (let i = 0; i < WIN_SCORE; i++) {
        const px = startX + i * gap;
        if (i < score) {
          ctx.fillStyle = color;
          ctx.shadowColor = color;
          ctx.shadowBlur = 6;
        } else {
          ctx.fillStyle = 'rgba(255,255,255,0.1)';
          ctx.shadowBlur = 0;
        }
        ctx.beginPath();
        ctx.arc(px, y, 3, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.shadowBlur = 0;
    }

    function drawPaddle(x, y, color, flash, padH) {
      ctx.save();

      // Glow
      const glowAlpha = 0.06 + flash * 0.25;
      const glowColor = hexToRgba(color, glowAlpha);
      const gc = ctx.createRadialGradient(
        x + PAD_W / 2, y + padH / 2, 5,
        x + PAD_W / 2, y + padH / 2, padH * 0.7
      );
      gc.addColorStop(0, glowColor);
      gc.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gc;
      ctx.fillRect(x - padH * 0.5, y - padH * 0.2, PAD_W + padH, padH * 1.4);

      // Body
      const r = 6;
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + PAD_W - r, y);
      ctx.arcTo(x + PAD_W, y, x + PAD_W, y + r, r);
      ctx.lineTo(x + PAD_W, y + padH - r);
      ctx.arcTo(x + PAD_W, y + padH, x + PAD_W - r, y + padH, r);
      ctx.lineTo(x + r, y + padH);
      ctx.arcTo(x, y + padH, x, y + padH - r, r);
      ctx.lineTo(x, y + r);
      ctx.arcTo(x, y, x + r, y, r);
      ctx.closePath();

      const pg = ctx.createLinearGradient(x, y, x, y + padH);
      const bright = flash > 0 ? lerp(1, 1.5, flash) : 1;
      pg.addColorStop(0, lerpColor('#ffffff', color, 0.5 * bright));
      pg.addColorStop(0.5, color);
      pg.addColorStop(1, lerpColor('#ffffff', color, 0.5 * bright));
      ctx.fillStyle = pg;
      ctx.shadowColor = color;
      ctx.shadowBlur = 8 + flash * 25;
      ctx.fill();

      ctx.restore();
    }

    function drawEffectIndicators(x, y, padH, effects, isLeft) {
      const now = Date.now();
      const barX = isLeft ? x - 6 : x + PAD_W + 2;

      if (effects.bigPaddle > now) {
        const t = (effects.bigPaddle - now) / 8000;
        ctx.fillStyle = '#44ff88';
        ctx.globalAlpha = 0.5 + Math.sin(now * 0.008) * 0.2;
        ctx.fillRect(barX, y, 3, padH * t);
        ctx.globalAlpha = 1;
      }

      if (effects.slowDown > now) {
        const t = (effects.slowDown - now) / 6000;
        ctx.fillStyle = '#ff4466';
        ctx.globalAlpha = 0.5 + Math.sin(now * 0.008) * 0.2;
        const bx = isLeft ? x - 6 : x + PAD_W + 6;
        ctx.fillRect(bx, y, 3, padH * t);
        ctx.globalAlpha = 1;
      }
    }

    function drawPowerup(pu) {
      const now = performance.now();
      const pulse = 0.85 + Math.sin(now * 0.004) * 0.15;
      const rot = now * 0.0015;
      const size = PU_RADIUS * pulse;

      ctx.save();
      ctx.translate(pu.x, pu.y);

      // Glow
      const glowGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 2);
      glowGrad.addColorStop(0, hexToRgba(pu.color, 0.12));
      glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glowGrad;
      ctx.beginPath();
      ctx.arc(0, 0, size * 2, 0, Math.PI * 2);
      ctx.fill();

      // Outer ring
      ctx.strokeStyle = pu.color;
      ctx.lineWidth = 1.5;
      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.arc(0, 0, size, 0, Math.PI * 2);
      ctx.stroke();

      // Inner fill
      ctx.globalAlpha = 0.08;
      ctx.fillStyle = pu.color;
      ctx.fill();

      // Icon
      ctx.globalAlpha = 0.9;
      ctx.fillStyle = pu.color;
      ctx.shadowColor = pu.color;
      ctx.shadowBlur = 10;

      ctx.save();
      ctx.rotate(rot);

      if (pu.type === 'bigPaddle') {
        // Tall rectangle (paddle icon)
        ctx.fillRect(-2.5, -size * 0.55, 5, size * 1.1);
        // Arrows
        ctx.beginPath();
        ctx.moveTo(0, -size * 0.7);
        ctx.lineTo(-5, -size * 0.4);
        ctx.lineTo(5, -size * 0.4);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(0, size * 0.7);
        ctx.lineTo(-5, size * 0.4);
        ctx.lineTo(5, size * 0.4);
        ctx.closePath();
        ctx.fill();
      } else if (pu.type === 'multiBall') {
        // Three circles
        for (let i = 0; i < 3; i++) {
          const a = (i / 3) * Math.PI * 2 - Math.PI / 2;
          ctx.beginPath();
          ctx.arc(Math.cos(a) * 5, Math.sin(a) * 5, 3, 0, Math.PI * 2);
          ctx.fill();
        }
      } else if (pu.type === 'slow') {
        // Hourglass shape
        ctx.beginPath();
        ctx.moveTo(-6, -size * 0.5);
        ctx.lineTo(6, -size * 0.5);
        ctx.lineTo(0, 0);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(-6, size * 0.5);
        ctx.lineTo(6, size * 0.5);
        ctx.lineTo(0, 0);
        ctx.closePath();
        ctx.fill();
      }

      ctx.restore(); // un-rotate
      ctx.shadowBlur = 0;
      ctx.restore(); // un-translate
    }

    // ── Game Loop ────────────────────────────────────────────────────────
    function tick() {
      update();
      draw();
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  })();
  </script>
</body>
